<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GalgoBet - Iniciar Sesión</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-logo">
        <h1>🐕 <span>GalgoBet</span></h1>
        <p>Carreras de galgos y apuestas virtuales</p>
      </div>

      <div class="auth-card">
        <div class="auth-toggle">
          <button id="btn-toggle-login" class="active">Iniciar Sesión</button>
          <button id="btn-toggle-register">Registrarse</button>
        </div>

        <form id="form-login">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" placeholder="tu@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" placeholder="Tu contraseña" autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Iniciar Sesión</button>
        </form>

        <form id="form-register" class="hidden">
          <div class="form-group">
            <label for="register-nombre">Nombre</label>
            <input type="text" id="register-nombre" placeholder="Tu nombre">
          </div>
          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" placeholder="tu@email.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="register-password">Contraseña</label>
            <input type="password" id="register-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
          </div>
          <div class="form-group">
            <label for="register-confirm">Confirmar Contraseña</label>
            <input type="password" id="register-confirm" placeholder="Repite la contraseña" autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block btn-lg">Registrarse</button>
        </form>

        <div id="error-message" class="error-message"></div>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
